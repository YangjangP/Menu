<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #eceadd;
            color: #312e2b;
        }
        
        ::selection {
            background-color: #dcd7ca;
            color: #1a1918;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        .font-cursive {
            font-family: 'Great Vibes', cursive;
        }

        .menu-paper {
            background-color: #fdfcf8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 0 20px rgba(0,0,0,0.02);
            position: relative;
        }
        .menu-paper::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid #e6e4d5;
            pointer-events: none;
        }

        .menu-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
            color: #b0aba6;
        }
        .menu-divider::before, .menu-divider::after {
            content: '';
            height: 1px;
            width: 60px;
            background-color: #e6e4d5;
            margin: 0 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 소설 본문 스타일 */
        .novel-text {
            line-height: 2.2;
            text-align: justify;
            word-break: break-all;
            /* 페이지 전환 시 부드러운 효과 */
            transition: opacity 0.4s ease-in-out;
        }

        .novel-text p {
            text-indent: 1em; /* 들여쓰기 원복 */
            margin-bottom: 0.5rem;
            transition: color 0.4s ease, font-style 0.4s ease;
        }

        /* 첫 페이지(서두/번외) 스타일 연출 */
        .novel-text.prologue-mode {
            padding-top: 3rem;
            padding-bottom: 2rem; 
            position: relative;
        }

        .novel-text.prologue-mode p:last-child {
            margin-bottom: 0; 
        }

        /* 첫 페이지 하단 메뉴판 장식 */
        .novel-text.prologue-mode::after {
            content: '··· ❖ ···';
            position: absolute;
            bottom: -0.5rem; 
            left: 0;
            right: 0;
            text-align: center;
            color: #b0aba6;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            line-height: 1;
        }

        .novel-text.prologue-mode p {
            color: #57534e; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 md:py-12 px-4 md:px-0">

    <!-- 메인 메뉴판 화면 -->
    <main id="menu-view" class="w-full max-w-2xl fade-in menu-paper py-12 md:py-16 px-6 md:px-12 my-2 md:my-6">
        <header class="text-center mb-12 md:mb-16 relative z-10">
            <h1 class="text-5xl md:text-7xl font-cursive tracking-widest mb-4 text-gray-800 mt-4 md:mt-0">Menu</h1>
            <div class="menu-divider"><span class="text-[12px]">❖</span></div>
        </header>

        <section class="mt-8 md:mt-12 mb-8 relative z-10">
            <ul id="menu-list" class="space-y-12 md:space-y-16">
                <!-- JS로 렌더링 -->
            </ul>
        </section>
    </main>

    <!-- 소설 읽기 화면 -->
    <article id="reading-view" class="w-full max-w-2xl hidden opacity-0 transition-opacity duration-500 menu-paper py-10 md:py-16 px-6 md:px-16 my-2 md:my-6">
        
        <!-- 상단 돌아가기 버튼 (빠른 이탈용) -->
        <nav class="mb-8 relative z-10">
            <button onclick="showMenu()" class="text-[13px] md:text-sm text-gray-400 hover:text-gray-800 transition-colors flex items-center group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                메뉴 접기
            </button>
        </nav>

        <!-- 소설 본문 -->
        <div id="chapter-content" class="novel-text text-[13.5px] md:text-[17px] text-gray-800 relative z-10 mt-4">
            <!-- JS로 페이지별 렌더링 -->
        </div>

        <!-- 하단 페이지네이션 (책장 넘기기) -->
        <nav class="mt-6 pt-5 border-t border-gray-200/60 relative z-10 flex justify-between items-center">
            <button id="prev-btn" class="text-[13px] md:text-sm text-gray-500 hover:text-gray-800 transition-colors tracking-widest disabled:opacity-30 disabled:cursor-not-allowed">
                &larr; 이전 장
            </button>
            <span id="page-indicator" class="text-xs md:text-sm text-gray-400 tracking-[0.2em] font-light">
                - 1 / 1 -
            </span>
            <button id="next-btn" class="text-[13px] md:text-sm text-gray-500 hover:text-gray-800 transition-colors tracking-widest disabled:opacity-30 disabled:cursor-not-allowed">
                다음 장 &rarr;
            </button>
        </nav>
    </article>

                        currentPageHTML += '<div class="h-2"></div>'; // 빈 줄 여백
                        return;
                    }
                    
                    // Salvation 등 중앙 정렬 특수 처리 제거. 모두 일반 문단으로 취급.
                    currentPageHTML += `<p>${text}</p>`;
                });
                
                if (currentPageHTML) {
                    currentPages.push(currentPageHTML);
                }
            });

            currentPageIndex = 0;
            renderCurrentPage();

            // 화면 전환
            const menuView = document.getElementById('menu-view');
            const readingView = document.getElementById('reading-view');

            menuView.style.opacity = '0';
            setTimeout(() => {
                menuView.classList.add('hidden');
                readingView.classList.remove('hidden');
                setTimeout(() => {
                    readingView.style.opacity = '1';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 50);
            }, 300);
        }

        // 현재 페이지 렌더링 함수
        function renderCurrentPage() {
            const contentDiv = document.getElementById('chapter-content');
            contentDiv.innerHTML = currentPages[currentPageIndex];
            
            // 첫 페이지일 경우 서두(프롤로그) 연출 클래스 추가
            if (currentPageIndex === 0) {
                contentDiv.classList.add('prologue-mode');
            } else {
                contentDiv.classList.remove('prologue-mode');
            }
            
            document.getElementById('page-indicator').innerText = `- ${currentPageIndex + 1} / ${currentPages.length} -`;

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            // 버튼 상태 업데이트
            prevBtn.disabled = currentPageIndex === 0;
            prevBtn.onclick = () => turnPage(-1);

            if (currentPageIndex === currentPages.length - 1) {
                // 마지막 페이지인 경우 다음 장 버튼이 메뉴판 덮기로 변환됨
                nextBtn.innerHTML = '메뉴판 덮기 &times;';
                nextBtn.onclick = showMenu;
            } else {
                nextBtn.innerHTML = '다음 장 &rarr;';
                nextBtn.onclick = () => turnPage(1);
            }
        }

        // 페이지 넘김 (페이드 인/아웃 효과 포함)
        function turnPage(delta) {
            const newIndex = currentPageIndex + delta;
            if (newIndex < 0 || newIndex >= currentPages.length) return;

            const contentDiv = document.getElementById('chapter-content');
            contentDiv.style.opacity = '0'; // 페이드 아웃

            setTimeout(() => {
                currentPageIndex = newIndex;
                renderCurrentPage();
                contentDiv.style.opacity = '1'; // 페이드 인
                window.scrollTo({ top: 0, behavior: 'smooth' }); // 상단 정렬
            }, 300);
        }

        function showMenu() {
            const menuView = document.getElementById('menu-view');
            const readingView = document.getElementById('reading-view');

            readingView.style.opacity = '0';
            setTimeout(() => {
                readingView.classList.add('hidden');
                menuView.classList.remove('hidden');
                setTimeout(() => {
                    menuView.style.opacity = '1';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 50);
            }, 300);
        }

        window.onload = renderMenuList;
    </script>
